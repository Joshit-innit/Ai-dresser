enable
configure terminal
hostname Router2

interface FastEthernet0/0
 ip address 12.0.0.1 255.255.255.0
 ip access-group 10 out
 no shutdown

interface Serial0/0/1
 ip address 14.0.0.2 255.255.255.0
 no shutdown

ip route 10.0.0.0 255.255.255.0 14.0.0.1
ip route 11.0.0.0 255.255.255.0 14.0.0.1

access-list 10 deny host 10.0.0.2
access-list 10 deny host 10.0.0.3
access-list 10 deny 11.0.0.0 0.0.0.255
access-list 10 permit any

end
write memory
